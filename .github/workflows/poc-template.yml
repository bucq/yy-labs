# POC追加時にこのファイルをコピーして poc-{name}.yml にリネームして使う
name: POC Template

on:
  push:
    paths:
      - "{poc-name}/**"
  pull_request:
    paths:
      - "{poc-name}/**"

jobs:
  # Vite + React の場合
  frontend:
    uses: ./.github/workflows/_frontend-ci.yml
    with:
      working-directory: "{poc-name}/apps/frontend"

  # Next.js の場合はこちらに差し替え
  # frontend:
  #   uses: ./.github/workflows/_frontend-nextjs-ci.yml
  #   with:
  #     working-directory: "{poc-name}/apps/frontend"

  # FastAPIバックエンドの場合はこちらを有効化
  # backend:
  #   uses: ./.github/workflows/_backend-fastapi-ci.yml
  #   with:
  #     working-directory: "{poc-name}/apps/backend"

  # Honoバックエンドの場合はこちらを有効化
  # backend:
  #   uses: ./.github/workflows/_backend-hono-ci.yml
  #   with:
  #     working-directory: "{poc-name}/apps/backend"
