name: Backend FastAPI CI (Reusable)

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Lint
        run: |
          pip install ruff
          ruff check .
      - name: Type check
        run: |
          pip install mypy
          mypy .
      - name: Test
        run: |
          pip install pytest pytest-asyncio httpx
          pytest
