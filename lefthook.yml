pre-commit:
  parallel: true
  commands:
    check-ts:
      glob: "*.{ts,tsx,js,jsx}"
      run: bunx biome check --no-errors-on-unmatched {staged_files}
    typecheck-ts:
      glob: "*.{ts,tsx}"
      run: |
        for file in {staged_files}; do
          dir=$(dirname "$file")
          while [ "$dir" != "." ]; do
            if [ -f "$dir/tsconfig.json" ]; then
              bun x tsc --noEmit -p "$dir/tsconfig.json"
              break
            fi
            dir=$(dirname "$dir")
          done
        done
    lint-py:
      glob: "*.py"
      run: ruff check {staged_files}
    typecheck-py:
      glob: "*.py"
      run: mypy {staged_files}
    format-py:
      glob: "*.py"
      run: ruff format --check {staged_files}

